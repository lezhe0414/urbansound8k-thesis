run_name: transformer_baseline
seed: 42

data:
  processed_dir: data/processed/urbansound8k_mels
  num_classes: 10
  val_fold_offset: 1

model:
  name: spectrogram_transformer
  in_channels: 1
  num_classes: 10
  patch_size: [16, 16]
  embed_dim: 128
  depth: 2
  num_heads: 4
  mlp_ratio: 2.0
  dropout: 0.2
  max_patches: 512

training:
  batch_size: 32
  epochs: 7
  learning_rate: 0.0003
  weight_decay: 0.0015
  num_workers: 0
  device: auto

outputs:
  results_dir: results
  figures_dir: figures
