run_name: pretrained_ast_baseline
seed: 42

data:
  processed_dir: data/processed/urbansound8k_mels
  num_classes: 10
  val_fold_offset: 1

model:
  name: pretrained_ast
  pretrained_name: MIT/ast-finetuned-audioset-10-10-0.4593
  num_classes: 10
  num_mel_bins: 128
  max_length: 1024
  freeze_encoder: true

training:
  batch_size: 16
  epochs: 3
  learning_rate: 0.0001
  weight_decay: 0.01
  label_smoothing: 0.03
  class_weighting:
    enabled: true
    power: 0.5
  class_aware_sampling:
    enabled: true
    power: 0.5
  scheduler:
    name: cosine
    min_learning_rate: 0.000001
  spec_augment:
    probability: 0.0
    frequency_mask_param: 8
    time_mask_param: 16
    num_frequency_masks: 1
    num_time_masks: 1
  mixup:
    enabled: false
    alpha: 0.05
    probability: 0.1
  num_workers: 0
  device: auto

outputs:
  results_dir: results
  figures_dir: figures
