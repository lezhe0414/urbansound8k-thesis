run_name: cnn_baseline
seed: 42

data:
  processed_dir: data/processed/urbansound8k_mels
  num_classes: 10
  val_fold_offset: 1

model:
  name: cnn
  in_channels: 1
  num_classes: 10
  dropout: 0.35

training:
  batch_size: 32
  epochs: 8
  learning_rate: 0.0004
  weight_decay: 0.0015
  label_smoothing: 0.05
  scheduler:
    name: cosine
    min_learning_rate: 0.00001
  num_workers: 0
  device: auto

outputs:
  results_dir: results
  figures_dir: figures
