run_name: cnn_baseline
seed: 42

data:
  processed_dir: data/processed/urbansound8k_mels
  num_classes: 10
  val_fold_offset: 1

model:
  name: cnn
  in_channels: 1
  num_classes: 10
  dropout: 0.35
  spatial_dropout: 0.1

training:
  batch_size: 32
  epochs: 10
  learning_rate: 0.00045
  weight_decay: 0.001
  label_smoothing: 0.03
  class_weighting:
    enabled: true
    power: 0.5
  class_aware_sampling:
    enabled: true
    power: 0.5
  scheduler:
    name: cosine
    min_learning_rate: 0.00001
  spec_augment:
    probability: 0.2
    frequency_mask_param: 8
    time_mask_param: 16
    num_frequency_masks: 1
    num_time_masks: 1
  mixup:
    enabled: false
    alpha: 0.05
    probability: 0.15
  num_workers: 0
  device: auto

outputs:
  results_dir: results
  figures_dir: figures
